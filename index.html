<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="responsivo.css">
</head>
<body>
    <header class="navbar-header">
    </header>

    <div class="login-box">
        <div class="flservices-logo">

  <div class="flservices-logo__mark">
    <span class="flservices-logo__text">FLSERVICES</span>
    <div class="flservices-logo__bar"></div>
  </div>
  <span class="flservices-logo__sub">Soluções Profissionais</span>
</div>
        <h1>Login</h1>
        <form id="login-form">
            <label for="usuario">Email</label><br>
            <input type="text" id="usuario" name="usuario" placeholder="Digite seu email..."><br>
            <label for="senha">Senha</label><br>
            <input type="password" id="senha" name="senha" placeholder="Digite sua senha..." autocomplete="off"><br>
            <button type="submit" onclick="event.preventDefault(); window.location.assign('escolha-de-curriculo.html'); return false;">Entrar</button>
        </form>
        <script>
            document.getElementById('login-form').addEventListener('submit', function (event) {
                event.preventDefault();
                window.location.assign('escolha-de-curriculo.html');
            });
        </script>
        <a href="cadastro.html" class="register-btn">Cadastrar</a>
        
    </div>
</body>
</html>
