<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumo do Currículo</title>
    <link rel="stylesheet" href="resumo-do-curriculo.css">
    <link rel="stylesheet" href="responsivo.css">
</head>
<body>
    <div class="logo-container">
        <img src="img/Captura de tela 2026-06-21 160257.png" alt="Logo">
    </div>
    <div class="page">
        <h1>Resumo do Currículo</h1>
        <div class="summary-card" id="summaryCard">
            <div class="summary-header">
                <div class="summary-avatar-box">
                    <img id="summaryFoto" class="summary-avatar" src="" alt="Foto do candidato">
                </div>
                <div>
                    <div class="summary-name" id="summaryName">Nome do candidato</div>
                    <div class="summary-role" id="summaryRole">Profissão</div>
                    <div class="summary-contact-chips">
                        <span><strong>CPF:</strong> <span id="summaryCpf">000.000.000-00</span></span>
                        <span><strong>Email:</strong> <span id="summaryEmail">email@exemplo.com</span></span>
                    </div>
                </div>
            </div>
            <div class="summary-block summary-block-large">
                <h2>Resumo Profissional</h2>
                <p id="summaryResumo">Resumo não disponível.</p>
            </div>
            <div class="summary-block">
                <h2>Experiência</h2>
                <div id="summaryExperiencias"></div>
            </div>
            <div class="summary-block">
                <h2>Educação</h2>
                <div id="summaryEducacao"></div>
            </div>
         
        <div class="nav">
            <a href="curriculos.html">Voltar para Currículos</a>
        </div>
    </div>
    <div class="top-icons-box">
        <a href="historico-chat.html" class="icon-btn" data-label="💬 Conversas" title="Conversas - Histórico de mensagens">
            <span class="icon-chat"></span>
        </a>
        <a href="curriculos.html" class="icon-btn" data-label="🔍 Pesquisar" title="Pesquisar - Buscar currículos">
            <span class="icon-search"></span>
        </a>
        <a href="config.html" class="icon-btn" data-label="⚙️ Configurações" title="Configurações - Tema, privacidade">
            <span class="icon-config"></span>
        </a>
        <a href="escolha-de-curriculo.html" class="icon-btn" data-label="👤 Meu Perfil" title="Perfil - Ver meu perfil">
            <span class="icon-profile"></span>
        </a>
        <a href="#" class="icon-btn" data-label="↩️ Voltar" title="Voltar - Página anterior" onclick="event.preventDefault(); history.back();">
            <span class="icon-back"></span>
        </a>
    </div>
</body>
</html>
